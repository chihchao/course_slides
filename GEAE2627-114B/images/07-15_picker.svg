<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<rect width="600" height="400" fill="#f8f9fa"/>

<g font-family="Arial, sans-serif" font-size="15">
  <!-- Phone date picker -->
  <rect x="70" y="40" width="230" height="320" rx="14" fill="#ffffff" stroke="#343a40" stroke-width="2"/>
  <text x="140" y="75" fill="#212529" font-weight="700" font-size="16">選擇日期</text>

  <!-- Wheel columns -->
  <rect x="90" y="100" width="60" height="220" rx="4" fill="#f8f9fa"/>
  <rect x="155" y="100" width="60" height="220" rx="4" fill="#f8f9fa"/>
  <rect x="220" y="100" width="60" height="220" rx="4" fill="#f8f9fa"/>

  <!-- Highlight center -->
  <rect x="85" y="192" width="200" height="36" fill="#e7f1ff"/>
  <line x1="85" y1="192" x2="285" y2="192" stroke="#0d6efd"/>
  <line x1="85" y1="228" x2="285" y2="228" stroke="#0d6efd"/>

  <!-- Numbers -->
  <text x="110" y="130" fill="#adb5bd" text-anchor="middle">2024</text>
  <text x="120" y="163" fill="#6c757d" text-anchor="middle">2025</text>
  <text x="120" y="217" fill="#0d6efd" text-anchor="middle" font-weight="700">2026</text>
  <text x="120" y="250" fill="#6c757d" text-anchor="middle">2027</text>
  <text x="120" y="283" fill="#adb5bd" text-anchor="middle">2028</text>

  <text x="185" y="130" fill="#adb5bd" text-anchor="middle">2 月</text>
  <text x="185" y="163" fill="#6c757d" text-anchor="middle">3 月</text>
  <text x="185" y="217" fill="#0d6efd" text-anchor="middle" font-weight="700">4 月</text>
  <text x="185" y="250" fill="#6c757d" text-anchor="middle">5 月</text>
  <text x="185" y="283" fill="#adb5bd" text-anchor="middle">6 月</text>

  <text x="250" y="130" fill="#adb5bd" text-anchor="middle">15</text>
  <text x="250" y="163" fill="#6c757d" text-anchor="middle">16</text>
  <text x="250" y="217" fill="#0d6efd" text-anchor="middle" font-weight="700">17</text>
  <text x="250" y="250" fill="#6c757d" text-anchor="middle">18</text>
  <text x="250" y="283" fill="#adb5bd" text-anchor="middle">19</text>

  <!-- Calendar picker -->
  <rect x="320" y="40" width="220" height="320" rx="10" fill="#ffffff" stroke="#dee2e6"/>
  <text x="385" y="75" fill="#212529" font-weight="700">2026 四月</text>
  <g fill="#6c757d" font-size="11">
    <text x="340" y="110" text-anchor="middle">日</text>
    <text x="370" y="110" text-anchor="middle">一</text>
    <text x="400" y="110" text-anchor="middle">二</text>
    <text x="430" y="110" text-anchor="middle">三</text>
    <text x="460" y="110" text-anchor="middle">四</text>
    <text x="490" y="110" text-anchor="middle">五</text>
    <text x="520" y="110" text-anchor="middle">六</text>
  </g>
  <g fill="#212529" font-size="12">
    <text x="340" y="140" text-anchor="middle">29</text>
    <text x="370" y="140" text-anchor="middle">30</text>
    <text x="400" y="140" text-anchor="middle">31</text>
    <text x="430" y="140" text-anchor="middle">1</text>
    <text x="460" y="140" text-anchor="middle">2</text>
    <text x="490" y="140" text-anchor="middle">3</text>
    <text x="520" y="140" text-anchor="middle">4</text>
    <text x="340" y="170" text-anchor="middle">5</text>
    <text x="370" y="170" text-anchor="middle">6</text>
    <text x="400" y="170" text-anchor="middle">7</text>
    <text x="430" y="170" text-anchor="middle">8</text>
    <text x="460" y="170" text-anchor="middle">9</text>
    <text x="490" y="170" text-anchor="middle">10</text>
    <text x="520" y="170" text-anchor="middle">11</text>
  </g>
  <!-- Range selection -->
  <rect x="352" y="184" width="180" height="26" fill="#e7f1ff"/>
  <circle cx="370" cy="197" r="13" fill="#0d6efd"/>
  <circle cx="490" cy="197" r="13" fill="#0d6efd"/>
  <text x="370" y="201" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">12</text>
  <text x="400" y="201" text-anchor="middle" fill="#0d6efd" font-size="12">13</text>
  <text x="430" y="201" text-anchor="middle" fill="#0d6efd" font-size="12">14</text>
  <text x="460" y="201" text-anchor="middle" fill="#0d6efd" font-size="12">15</text>
  <text x="490" y="201" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">16</text>
  <text x="520" y="201" text-anchor="middle" fill="#212529" font-size="12">17</text>
</g>

</svg>