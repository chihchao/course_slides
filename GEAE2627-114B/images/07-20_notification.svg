<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<rect width="600" height="400" fill="#f8f9fa"/>

<g font-family="Arial, sans-serif" font-size="14">
  <!-- Nav bar -->
  <rect x="60" y="60" width="480" height="60" rx="6" fill="#ffffff" stroke="#e9ecef"/>
  <text x="85" y="98" font-weight="700" fill="#212529" font-size="18">MyApp</text>

  <!-- Bell icon with bubble -->
  <g transform="translate(400,78)">
    <path d="M 12 3 L 16 8 L 16 18 L 18 20 L 6 20 L 8 18 L 8 8 Z" fill="none" stroke="#495057" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="20" cy="5" r="8" fill="#dc3545"/>
    <text x="20" y="9" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">5</text>
  </g>

  <!-- Mail icon with dot -->
  <g transform="translate(450,80)">
    <rect x="0" y="0" width="26" height="18" rx="2" fill="none" stroke="#495057" stroke-width="2"/>
    <polyline points="0,0 13,12 26,0" fill="none" stroke="#495057" stroke-width="2"/>
    <circle cx="26" cy="2" r="6" fill="#dc3545"/>
  </g>

  <!-- Avatar with online dot -->
  <g transform="translate(495,78)">
    <circle cx="15" cy="15" r="15" fill="#74c0fc"/>
    <circle cx="15" cy="12" r="5" fill="#ffffff"/>
    <path d="M 5 28 Q 15 20 25 28" fill="#ffffff"/>
    <circle cx="26" cy="26" r="6" fill="#ffffff"/>
    <circle cx="26" cy="26" r="4" fill="#40c057"/>
  </g>

  <!-- Message list -->
  <rect x="60" y="150" width="480" height="210" rx="6" fill="#ffffff" stroke="#e9ecef"/>

  <rect x="60" y="150" width="480" height="60" fill="#e7f1ff"/>
  <circle cx="100" cy="180" r="18" fill="#ffd43b"/>
  <circle cx="112" cy="170" r="6" fill="#dc3545"/>
  <text x="112" y="174" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">3</text>
  <text x="135" y="178" font-weight="700" fill="#212529">王小明</text>
  <text x="135" y="198" fill="#6c757d" font-size="13">您有 3 則新訊息...</text>

  <circle cx="100" cy="240" r="18" fill="#74c0fc"/>
  <text x="135" y="238" font-weight="700" fill="#212529">專案通知</text>
  <text x="135" y="258" fill="#6c757d" font-size="13">任務已完成：UI 設計稿</text>

  <circle cx="100" cy="300" r="18" fill="#ff8787"/>
  <circle cx="112" cy="290" r="6" fill="#dc3545"/>
  <text x="135" y="298" font-weight="700" fill="#212529">系統公告</text>
  <text x="135" y="318" fill="#6c757d" font-size="13">維護通知：本週日將進行系統更新</text>
</g>

</svg>