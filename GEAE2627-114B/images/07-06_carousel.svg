<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<rect width="600" height="400" fill="#f8f9fa"/>

<g font-family="Arial, sans-serif" font-size="14">
  <rect x="60" y="80" width="480" height="220" rx="8" fill="#ffffff" stroke="#dee2e6"/>

  <!-- Main card visible -->
  <rect x="130" y="100" width="340" height="180" rx="8" fill="#74c0fc"/>
  <circle cx="300" cy="175" r="38" fill="#ffffff" opacity="0.9"/>
  <text x="265" y="180" font-size="22" font-weight="700" fill="#0d6efd">圖片 2</text>

  <!-- Partial left card -->
  <rect x="40" y="110" width="100" height="160" rx="8" fill="#ffd43b" opacity="0.6"/>
  <!-- Partial right card -->
  <rect x="460" y="110" width="100" height="160" rx="8" fill="#ff8787" opacity="0.6"/>

  <!-- Arrows -->
  <circle cx="90" cy="190" r="22" fill="#ffffff" stroke="#dee2e6"/>
  <polygon points="98,180 98,200 84,190" fill="#495057"/>
  <circle cx="510" cy="190" r="22" fill="#ffffff" stroke="#dee2e6"/>
  <polygon points="502,180 502,200 516,190" fill="#495057"/>

  <!-- Dots indicator -->
  <circle cx="275" cy="330" r="5" fill="#adb5bd"/>
  <circle cx="295" cy="330" r="6" fill="#0d6efd"/>
  <circle cx="315" cy="330" r="5" fill="#adb5bd"/>
  <circle cx="335" cy="330" r="5" fill="#adb5bd"/>
</g>

</svg>