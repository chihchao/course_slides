<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="sans-serif">
  <rect width="520" height="300" fill="#f8f9fa" rx="12"/>
  <text x="260" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">可觸控區域規範（Touch Target）</text>

  <!-- BAD example - too small -->
  <text x="110" y="58" text-anchor="middle" font-size="12" fill="#dc2626" font-weight="bold">✗  不建議</text>
  <!-- Small target area -->
  <rect x="74" y="70" width="72" height="72" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="110" y="82" text-anchor="middle" font-size="8.5" fill="#dc2626">觸控區 24×24px</text>
  <!-- Tiny icon -->
  <circle cx="110" cy="113" r="12" fill="#dc2626" opacity="0.8"/>
  <text x="110" y="118" text-anchor="middle" font-size="12" fill="white">✗</text>

  <!-- Arrow -->
  <text x="200" y="112" text-anchor="middle" font-size="22" fill="#9ca3af">→</text>

  <!-- GOOD example Apple HIG -->
  <text x="300" y="58" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="bold">✓  Apple HIG</text>
  <!-- Large target area -->
  <rect x="258" y="66" width="84" height="84" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="300" y="80" text-anchor="middle" font-size="8.5" fill="#16a34a">觸控區 44×44pt</text>
  <!-- Icon center -->
  <circle cx="300" cy="113" r="12" fill="#16a34a"/>
  <text x="300" y="118" text-anchor="middle" font-size="12" fill="white">✓</text>
  <text x="300" y="162" text-anchor="middle" font-size="9" fill="#15803d">最小 44×44 pt</text>

  <!-- GOOD example Material -->
  <text x="430" y="58" text-anchor="middle" font-size="12" fill="#1a73e8" font-weight="bold">✓  Material</text>
  <!-- Large target area -->
  <rect x="386" y="66" width="88" height="88" rx="10" fill="#dbeafe" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="430" y="80" text-anchor="middle" font-size="8.5" fill="#1a73e8">觸控區 48×48dp</text>
  <!-- Icon center -->
  <circle cx="430" cy="113" r="12" fill="#1a73e8"/>
  <text x="430" y="118" text-anchor="middle" font-size="12" fill="white">✓</text>
  <text x="430" y="162" text-anchor="middle" font-size="9" fill="#1d4ed8">建議 48×48 dp</text>

  <!-- Horizontal divider -->
  <line x1="20" y1="178" x2="500" y2="178" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Spacing requirement -->
  <text x="260" y="200" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">觸控目標間距要求</text>

  <!-- Two buttons with spacing -->
  <rect x="60" y="214" width="130" height="44" rx="8" fill="#1a73e8"/>
  <text x="125" y="241" text-anchor="middle" font-size="12" fill="white" font-weight="bold">按鈕 A</text>
  <!-- Spacing indicator -->
  <rect x="198" y="225" width="24" height="22" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="210" y="240" text-anchor="middle" font-size="9" fill="#ca8a04" font-weight="bold">8dp</text>
  <!-- Button B -->
  <rect x="230" y="214" width="130" height="44" rx="8" fill="#7c3aed"/>
  <text x="295" y="241" text-anchor="middle" font-size="12" fill="white" font-weight="bold">按鈕 B</text>

  <!-- Note -->
  <rect x="60" y="270" width="400" height="22" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="260" y="285" text-anchor="middle" font-size="10" fill="#92400e">視覺圖示可能只有 24px，透過 padding 讓實際可點擊範圍達到 44px 以上</text>
</svg>
