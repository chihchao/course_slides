<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="sans-serif">
  <rect width="520" height="340" fill="#f8f9fa" rx="12"/>
  <text x="260" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">字體系統（Typography Scale）</text>

  <!-- Scale rows -->
  <!-- H1 -->
  <rect x="16" y="46" width="488" height="2" fill="#e5e7eb"/>
  <text x="20" y="80" font-size="32" font-weight="700" fill="#111827">H1 標題一</text>
  <text x="490" y="70" text-anchor="end" font-size="10" fill="#6b7280">32px / Bold / Line 1.2</text>

  <!-- H2 -->
  <rect x="16" y="92" width="488" height="1" fill="#e5e7eb"/>
  <text x="20" y="118" font-size="24" font-weight="700" fill="#111827">H2 標題二</text>
  <text x="490" y="108" text-anchor="end" font-size="10" fill="#6b7280">24px / Bold / Line 1.3</text>

  <!-- H3 -->
  <rect x="16" y="128" width="488" height="1" fill="#e5e7eb"/>
  <text x="20" y="150" font-size="20" font-weight="600" fill="#111827">H3 標題三</text>
  <text x="490" y="140" text-anchor="end" font-size="10" fill="#6b7280">20px / SemiBold / Line 1.4</text>

  <!-- Body Large -->
  <rect x="16" y="160" width="488" height="1" fill="#e5e7eb"/>
  <text x="20" y="180" font-size="16" font-weight="400" fill="#374151">Body Large 大內文：設計系統建立視覺規範。</text>
  <text x="490" y="172" text-anchor="end" font-size="10" fill="#6b7280">16px / Regular / Line 1.6</text>

  <!-- Body -->
  <rect x="16" y="190" width="488" height="1" fill="#e5e7eb"/>
  <text x="20" y="210" font-size="14" font-weight="400" fill="#374151">Body 一般內文：建立共同語言，減少溝通誤差。</text>
  <text x="490" y="200" text-anchor="end" font-size="10" fill="#6b7280">14px / Regular / Line 1.6</text>

  <!-- Caption -->
  <rect x="16" y="220" width="488" height="1" fill="#e5e7eb"/>
  <text x="20" y="238" font-size="12" font-weight="400" fill="#6b7280">Caption 說明文字：輔助說明的次要資訊。</text>
  <text x="490" y="230" text-anchor="end" font-size="10" fill="#6b7280">12px / Regular / Line 1.5</text>

  <!-- Label -->
  <rect x="16" y="246" width="488" height="1" fill="#e5e7eb"/>
  <text x="20" y="264" font-size="11" font-weight="500" fill="#6b7280" letter-spacing="0.5">LABEL 標籤文字</text>
  <text x="490" y="258" text-anchor="end" font-size="10" fill="#6b7280">11px / Medium / LS+0.5</text>

  <!-- Scale visualization -->
  <rect x="16" y="274" width="488" height="1" fill="#e5e7eb"/>
  <text x="20" y="292" font-size="11" fill="#9ca3af" font-weight="bold">Type Scale</text>
  <rect x="80" y="283" width="24" height="16" rx="3" fill="#1a73e8"/>
  <text x="92" y="295" text-anchor="middle" font-size="9" fill="white" font-weight="bold">32</text>
  <rect x="110" y="285" width="20" height="14" rx="3" fill="#4a90d9"/>
  <text x="120" y="296" text-anchor="middle" font-size="9" fill="white">24</text>
  <rect x="136" y="287" width="18" height="12" rx="3" fill="#7ab5ed"/>
  <text x="145" y="297" text-anchor="middle" font-size="9" fill="white">20</text>
  <rect x="160" y="288" width="16" height="11" rx="3" fill="#a3c9f1"/>
  <text x="168" y="297" text-anchor="middle" font-size="9" fill="white">18</text>
  <rect x="182" y="289" width="15" height="10" rx="3" fill="#c5def7"/>
  <text x="189" y="297" text-anchor="middle" font-size="9" fill="#555">16</text>
  <rect x="203" y="290" width="14" height="9" rx="3" fill="#deeefb"/>
  <text x="210" y="297" text-anchor="middle" font-size="9" fill="#555">14</text>
  <rect x="223" y="291" width="13" height="8" rx="3" fill="#eff6fd"/>
  <text x="229" y="297" text-anchor="middle" font-size="9" fill="#555">12</text>
  <rect x="242" y="292" width="12" height="7" rx="3" fill="#f5f9fe" stroke="#d1d5db" stroke-width="0.5"/>
  <text x="248" y="297" text-anchor="middle" font-size="9" fill="#888">11</text>

  <text x="260" y="320" text-anchor="middle" font-size="10" fill="#999">建立清晰的視覺層次，讓使用者快速掌握資訊優先順序</text>
</svg>
