<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Background -->
  <rect width="480" height="320" fill="#f8f8f8" rx="8"/>
  <text x="240" y="22" text-anchor="middle" font-size="12" fill="#888" font-weight="bold">Mid-Fidelity Wireframe</text>

  <!-- Browser chrome -->
  <rect x="20" y="32" width="440" height="272" rx="6" fill="#fff" stroke="#ccc" stroke-width="1.5"/>
  <rect x="20" y="32" width="440" height="28" rx="6" fill="#e8e8e8" stroke="#ccc" stroke-width="1.5"/>
  <circle cx="38" cy="46" r="5" fill="#f66"/>
  <circle cx="54" cy="46" r="5" fill="#fa3"/>
  <circle cx="70" cy="46" r="5" fill="#4c4"/>
  <rect x="90" y="38" width="280" height="16" rx="8" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="230" y="50" text-anchor="middle" font-size="9" fill="#aaa">www.example.com</text>

  <!-- Nav bar with labels -->
  <rect x="20" y="60" width="440" height="32" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <text x="42" y="80" font-size="11" font-weight="bold" fill="#555">LOGO</text>
  <text x="110" y="80" font-size="10" fill="#555">首頁</text>
  <text x="158" y="80" font-size="10" fill="#555">產品</text>
  <text x="206" y="80" font-size="10" fill="#555">關於</text>
  <text x="254" y="80" font-size="10" fill="#555">聯絡</text>
  <rect x="378" y="66" width="64" height="20" rx="4" fill="#555"/>
  <text x="410" y="80" text-anchor="middle" font-size="10" fill="#fff">立即購買</text>

  <!-- Hero section -->
  <rect x="36" y="104" width="200" height="110" fill="#e8e8e8" rx="4"/>
  <line x1="36" y1="104" x2="236" y2="214" stroke="#ccc" stroke-width="1"/>
  <line x1="236" y1="104" x2="36" y2="214" stroke="#ccc" stroke-width="1"/>
  <text x="136" y="163" text-anchor="middle" font-size="11" fill="#aaa">主視覺圖片</text>
  <text x="136" y="178" text-anchor="middle" font-size="9" fill="#bbb">800 × 500</text>

  <rect x="252" y="108" width="192" height="14" rx="3" fill="#ccc"/>
  <text x="348" y="120" text-anchor="middle" font-size="10" fill="#888">主要標題文字</text>
  <rect x="252" y="130" width="160" height="9" rx="2" fill="#ddd"/>
  <rect x="252" y="145" width="150" height="9" rx="2" fill="#ddd"/>
  <rect x="252" y="160" width="170" height="9" rx="2" fill="#ddd"/>
  <rect x="252" y="178" width="80" height="22" rx="4" fill="#555"/>
  <text x="292" y="193" text-anchor="middle" font-size="10" fill="#fff">了解更多</text>

  <!-- Cards row -->
  <rect x="36" y="228" width="124" height="60" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <rect x="44" y="236" width="108" height="28" rx="2" fill="#ddd"/>
  <line x1="44" y1="236" x2="152" y2="264" stroke="#ccc" stroke-width="1"/>
  <line x1="152" y1="236" x2="44" y2="264" stroke="#ccc" stroke-width="1"/>
  <rect x="44" y="270" width="80" height="8" rx="2" fill="#ccc"/>

  <rect x="178" y="228" width="124" height="60" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <rect x="186" y="236" width="108" height="28" rx="2" fill="#ddd"/>
  <line x1="186" y1="236" x2="294" y2="264" stroke="#ccc" stroke-width="1"/>
  <line x1="294" y1="236" x2="186" y2="264" stroke="#ccc" stroke-width="1"/>
  <rect x="186" y="270" width="80" height="8" rx="2" fill="#ccc"/>

  <rect x="320" y="228" width="124" height="60" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <rect x="328" y="236" width="108" height="28" rx="2" fill="#ddd"/>
  <line x1="328" y1="236" x2="436" y2="264" stroke="#ccc" stroke-width="1"/>
  <line x1="436" y1="236" x2="328" y2="264" stroke="#ccc" stroke-width="1"/>
  <rect x="328" y="270" width="80" height="8" rx="2" fill="#ccc"/>
</svg>
