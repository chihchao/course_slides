<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<rect width="600" height="400" fill="#f8f9fa"/>

<g font-family="Arial, sans-serif" font-size="14">
  <!-- Action bar -->
  <rect x="60" y="60" width="480" height="50" rx="4" fill="#e7f1ff" stroke="#0d6efd"/>
  <rect x="80" y="79" width="16" height="16" rx="3" fill="#0d6efd"/>
  <line x1="84" y1="87" x2="92" y2="87" stroke="#ffffff" stroke-width="2"/>
  <text x="110" y="92" fill="#212529" font-weight="600">已選取 3 封郵件</text>

  <rect x="300" y="74" width="70" height="28" rx="4" fill="#ffffff" stroke="#dee2e6"/>
  <text x="335" y="93" text-anchor="middle" fill="#495057" font-size="12">標記</text>

  <rect x="380" y="74" width="70" height="28" rx="4" fill="#ffffff" stroke="#dee2e6"/>
  <text x="415" y="93" text-anchor="middle" fill="#495057" font-size="12">封存</text>

  <rect x="460" y="74" width="70" height="28" rx="4" fill="#dc3545"/>
  <text x="495" y="93" text-anchor="middle" fill="#ffffff" font-weight="600" font-size="12">刪除</text>

  <!-- Row 1: selected -->
  <rect x="60" y="120" width="480" height="50" fill="#e7f1ff"/>
  <rect x="80" y="139" width="16" height="16" rx="3" fill="#0d6efd"/>
  <line x1="84" y1="147" x2="88" y2="151" stroke="#ffffff" stroke-width="2"/>
  <line x1="88" y1="151" x2="94" y2="143" stroke="#ffffff" stroke-width="2"/>
  <text x="110" y="152" fill="#212529" font-weight="700">王小明</text>
  <text x="210" y="152" fill="#495057">季度報告已送達</text>

  <!-- Row 2: not selected -->
  <rect x="60" y="170" width="480" height="50" fill="#ffffff"/>
  <rect x="80" y="189" width="16" height="16" rx="3" fill="#ffffff" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="110" y="202" fill="#212529" font-weight="600">李大華</text>
  <text x="210" y="202" fill="#495057">關於週五會議</text>

  <!-- Row 3: selected -->
  <rect x="60" y="220" width="480" height="50" fill="#e7f1ff"/>
  <rect x="80" y="239" width="16" height="16" rx="3" fill="#0d6efd"/>
  <line x1="84" y1="247" x2="88" y2="251" stroke="#ffffff" stroke-width="2"/>
  <line x1="88" y1="251" x2="94" y2="243" stroke="#ffffff" stroke-width="2"/>
  <text x="110" y="252" fill="#212529" font-weight="700">系統通知</text>
  <text x="210" y="252" fill="#495057">帳號登入異常提醒</text>

  <!-- Row 4: selected -->
  <rect x="60" y="270" width="480" height="50" fill="#e7f1ff"/>
  <rect x="80" y="289" width="16" height="16" rx="3" fill="#0d6efd"/>
  <line x1="84" y1="297" x2="88" y2="301" stroke="#ffffff" stroke-width="2"/>
  <line x1="88" y1="301" x2="94" y2="293" stroke="#ffffff" stroke-width="2"/>
  <text x="110" y="302" fill="#212529" font-weight="700">電商促銷</text>
  <text x="210" y="302" fill="#495057">週年慶限時優惠</text>

  <!-- Row 5 -->
  <rect x="60" y="320" width="480" height="50" fill="#ffffff"/>
  <rect x="80" y="339" width="16" height="16" rx="3" fill="#ffffff" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="110" y="352" fill="#212529" font-weight="600">張三豐</text>
  <text x="210" y="352" fill="#495057">下週專案進度更新</text>
</g>

</svg>