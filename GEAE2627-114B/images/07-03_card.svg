<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<rect width="600" height="400" fill="#f8f9fa"/>

<g font-family="Arial, sans-serif" font-size="14">
  <!-- Card 1 -->
  <rect x="60" y="70" width="160" height="260" rx="8" fill="#ffffff" stroke="#dee2e6" filter="url(#c_shadow)"/>
  <defs>
    <filter id="c_shadow"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/></filter>
  </defs>
  <rect x="60" y="70" width="160" height="110" rx="8" fill="#74c0fc"/>
  <circle cx="140" cy="125" r="28" fill="#ffffff" opacity="0.8"/>
  <text x="80" y="205" font-weight="700" fill="#212529">產品 A</text>
  <text x="80" y="228" fill="#6c757d" font-size="12">精選推薦</text>
  <text x="80" y="255" fill="#495057" font-size="12">高品質材質</text>
  <rect x="80" y="275" width="120" height="32" rx="4" fill="#0d6efd"/>
  <text x="120" y="296" fill="#ffffff" font-weight="600">查看詳情</text>

  <!-- Card 2 -->
  <rect x="230" y="70" width="160" height="260" rx="8" fill="#ffffff" stroke="#dee2e6" filter="url(#c_shadow)"/>
  <rect x="230" y="70" width="160" height="110" rx="8" fill="#ffd43b"/>
  <circle cx="310" cy="125" r="28" fill="#ffffff" opacity="0.8"/>
  <text x="250" y="205" font-weight="700" fill="#212529">產品 B</text>
  <text x="250" y="228" fill="#6c757d" font-size="12">熱銷商品</text>
  <text x="250" y="255" fill="#495057" font-size="12">限時優惠</text>
  <rect x="250" y="275" width="120" height="32" rx="4" fill="#0d6efd"/>
  <text x="290" y="296" fill="#ffffff" font-weight="600">查看詳情</text>

  <!-- Card 3 -->
  <rect x="400" y="70" width="160" height="260" rx="8" fill="#ffffff" stroke="#dee2e6" filter="url(#c_shadow)"/>
  <rect x="400" y="70" width="160" height="110" rx="8" fill="#ff8787"/>
  <circle cx="480" cy="125" r="28" fill="#ffffff" opacity="0.8"/>
  <text x="420" y="205" font-weight="700" fill="#212529">產品 C</text>
  <text x="420" y="228" fill="#6c757d" font-size="12">全新上市</text>
  <text x="420" y="255" fill="#495057" font-size="12">設計師款</text>
  <rect x="420" y="275" width="120" height="32" rx="4" fill="#0d6efd"/>
  <text x="460" y="296" fill="#ffffff" font-weight="600">查看詳情</text>
</g>

</svg>