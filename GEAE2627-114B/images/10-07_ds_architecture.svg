<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="sans-serif">
  <rect width="520" height="340" fill="#f8f9fa" rx="12"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">設計系統七大核心架構</text>

  <!-- Layer 7: Documentation (top, widest conceptually) -->
  <rect x="20" y="42" width="480" height="38" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="36" y="58" font-size="12" font-weight="bold" fill="#166534">7. 使用說明文件（Documentation）</text>
  <text x="36" y="72" font-size="10" fill="#15803d">記載元件使用情境、限制與設計理由，讓所有成員理解「為何這樣設計」</text>

  <!-- Layer 6: Templates -->
  <rect x="20" y="88" width="480" height="38" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="36" y="104" font-size="12" font-weight="bold" fill="#1e40af">6. 範本（Templates）</text>
  <text x="36" y="118" font-size="10" fill="#1d4ed8">由元件組合成常見頁面結構：商品列表頁、文章頁、Hero Banner…</text>

  <!-- Layer 5: Variants & States -->
  <rect x="20" y="134" width="480" height="38" rx="8" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="36" y="150" font-size="12" font-weight="bold" fill="#6b21a8">5. 變體與狀態（Variants &amp; States）</text>
  <text x="36" y="164" font-size="10" fill="#7e22ce">Default / Hover / Pressed / Focused / Disabled — 定義所有互動樣態</text>

  <!-- Layer 4: Components -->
  <rect x="20" y="180" width="480" height="38" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="36" y="196" font-size="12" font-weight="bold" fill="#9a3412">4. 元件庫（Components）</text>
  <text x="36" y="210" font-size="10" fill="#c2410c">Button · Input · Card · Modal · Navbar · Badge · Avatar · Tag…</text>

  <!-- Layer 3: Spacing & Layout -->
  <rect x="20" y="226" width="480" height="38" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="36" y="242" font-size="12" font-weight="bold" fill="#713f12">3. 間距與版面（Spacing &amp; Layout）</text>
  <text x="36" y="256" font-size="10" fill="#92400e">8pt Grid System · Columns Grid · Auto Layout · 響應式斷點</text>

  <!-- Layer 2: Typography -->
  <rect x="20" y="272" width="232" height="38" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="36" y="288" font-size="12" font-weight="bold" fill="#0c4a6e">2. 字體系統（Typography）</text>
  <text x="36" y="302" font-size="10" fill="#075985">H1–H6 · Body · Caption · 行高 · 字重</text>

  <!-- Layer 1: Color System -->
  <rect x="268" y="272" width="232" height="38" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="284" y="288" font-size="12" font-weight="bold" fill="#991b1b">1. 色彩系統（Color System）</text>
  <text x="284" y="302" font-size="10" fill="#b91c1c">Primary · Secondary · Neutral · Semantic</text>

  <!-- Bottom label -->
  <text x="260" y="328" text-anchor="middle" font-size="10" fill="#999">由底層的視覺基礎，逐層疊加到最終的完整文件，形成設計系統的完整架構</text>
</svg>
