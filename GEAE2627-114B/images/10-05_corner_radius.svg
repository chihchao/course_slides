<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="sans-serif">
  <rect width="520" height="300" fill="#f8f9fa" rx="12"/>
  <text x="260" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">圓角規範（Corner Radius）</text>

  <!-- Input field - small radius -->
  <g transform="translate(30, 50)">
    <text x="60" y="15" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">輸入框</text>
    <rect x="0" y="22" width="120" height="40" rx="4" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
    <text x="60" y="47" text-anchor="middle" font-size="11" fill="#94a3b8">placeholder...</text>
    <rect x="110" y="80" width="10" height="10" rx="4" fill="none" stroke="#1a73e8" stroke-width="1.5"/>
    <text x="60" y="102" text-anchor="middle" font-size="11" fill="#1a73e8" font-weight="bold">r = 4px</text>
    <text x="60" y="116" text-anchor="middle" font-size="9" fill="#6b7280">結構清晰感</text>
  </g>

  <!-- Button - medium radius -->
  <g transform="translate(170, 50)">
    <text x="60" y="15" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">按鈕</text>
    <rect x="0" y="22" width="120" height="40" rx="8" fill="#1a73e8"/>
    <text x="60" y="47" text-anchor="middle" font-size="11" fill="white" font-weight="bold">確認送出</text>
    <rect x="110" y="80" width="10" height="10" rx="8" fill="none" stroke="#1a73e8" stroke-width="1.5"/>
    <text x="60" y="102" text-anchor="middle" font-size="11" fill="#1a73e8" font-weight="bold">r = 8px</text>
    <text x="60" y="116" text-anchor="middle" font-size="9" fill="#6b7280">柔和與穩定感</text>
  </g>

  <!-- Card - large radius -->
  <g transform="translate(310, 50)">
    <text x="60" y="15" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">卡片</text>
    <rect x="0" y="22" width="120" height="40" rx="16" fill="#f0f9ff" stroke="#bae6fd" stroke-width="2"/>
    <text x="60" y="47" text-anchor="middle" font-size="10" fill="#0369a1">卡片內容</text>
    <rect x="108" y="78" width="12" height="12" rx="16" fill="none" stroke="#1a73e8" stroke-width="1.5"/>
    <text x="60" y="102" text-anchor="middle" font-size="11" fill="#1a73e8" font-weight="bold">r = 16px</text>
    <text x="60" y="116" text-anchor="middle" font-size="9" fill="#6b7280">深度與沉浸感</text>
  </g>

  <!-- FAB - full circle -->
  <g transform="translate(450, 50)">
    <text x="35" y="15" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">FAB</text>
    <circle cx="35" cy="42" r="24" fill="#1a73e8"/>
    <text x="35" y="48" text-anchor="middle" font-size="18" fill="white">+</text>
    <text x="35" y="102" text-anchor="middle" font-size="11" fill="#1a73e8" font-weight="bold">r = 50%</text>
    <text x="35" y="116" text-anchor="middle" font-size="9" fill="#6b7280">全圓形</text>
  </g>

  <!-- Divider -->
  <line x1="20" y1="178" x2="500" y2="178" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Inner/Outer ratio explanation -->
  <text x="260" y="200" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">內外圓角比例法則</text>

  <!-- Outer container -->
  <rect x="80" y="212" width="160" height="60" rx="20" fill="#dbeafe" stroke="#1a73e8" stroke-width="2"/>
  <text x="80" y="207" font-size="10" fill="#1a73e8">外層 r = 20px</text>
  <!-- Inner element -->
  <rect x="96" y="224" width="128" height="36" rx="8" fill="#1a73e8" opacity="0.8"/>
  <text x="160" y="247" text-anchor="middle" font-size="10" fill="white">內層 r = 8px</text>

  <!-- Arrow and formula -->
  <text x="265" y="248" text-anchor="middle" font-size="20" fill="#6b7280">⟹</text>

  <!-- Formula box -->
  <rect x="290" y="212" width="210" height="60" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="395" y="234" text-anchor="middle" font-size="11" fill="#166534" font-weight="bold">外圓角 = 內圓角 + 間距</text>
  <text x="395" y="252" text-anchor="middle" font-size="11" fill="#15803d">20 = 8 + 12（padding）</text>
  <text x="395" y="266" text-anchor="middle" font-size="10" fill="#6b7280">或外圓角 ≈ 內圓角 × 1.5～2</text>

  <text x="260" y="290" text-anchor="middle" font-size="10" fill="#999">統一的圓角半徑能建立品牌一致的視覺語彙，反映產品個性</text>
</svg>
