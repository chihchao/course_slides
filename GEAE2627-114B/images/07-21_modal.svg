<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<rect width="600" height="400" fill="#f8f9fa"/>

<g font-family="Arial, sans-serif" font-size="15">
  <!-- Background page (dimmed) -->
  <rect x="40" y="40" width="520" height="320" rx="6" fill="#ffffff" stroke="#dee2e6"/>
  <rect x="60" y="60" width="200" height="20" rx="3" fill="#e9ecef"/>
  <rect x="60" y="100" width="480" height="12" rx="3" fill="#e9ecef"/>
  <rect x="60" y="125" width="460" height="12" rx="3" fill="#e9ecef"/>
  <rect x="60" y="150" width="420" height="12" rx="3" fill="#e9ecef"/>
  <rect x="60" y="190" width="140" height="44" rx="4" fill="#e9ecef"/>

  <!-- Overlay -->
  <rect x="40" y="40" width="520" height="320" rx="6" fill="#000000" opacity="0.5"/>

  <!-- Modal dialog -->
  <rect x="150" y="100" width="300" height="200" rx="8" fill="#ffffff" filter="url(#m_shadow)"/>
  <defs>
    <filter id="m_shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.25"/></filter>
  </defs>

  <text x="175" y="135" font-weight="700" fill="#212529" font-size="18">確認刪除</text>
  <text x="420" y="135" fill="#adb5bd" font-weight="700" font-size="20">×</text>
  <line x1="170" y1="150" x2="430" y2="150" stroke="#f1f3f5"/>

  <text x="175" y="185" fill="#495057" font-size="14">您確定要永久刪除這個項目嗎？</text>
  <text x="175" y="210" fill="#495057" font-size="14">此操作無法復原。</text>

  <rect x="230" y="245" width="90" height="40" rx="4" fill="#ffffff" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="275" y="270" text-anchor="middle" fill="#495057" font-weight="600">取消</text>

  <rect x="330" y="245" width="90" height="40" rx="4" fill="#dc3545"/>
  <text x="375" y="270" text-anchor="middle" fill="#ffffff" font-weight="700">刪除</text>
</g>

</svg>