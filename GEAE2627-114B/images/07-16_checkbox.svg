<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<rect width="600" height="400" fill="#f8f9fa"/>

<g font-family="Arial, sans-serif" font-size="15">
  <text x="80" y="70" fill="#495057" font-weight="600">待辦事項</text>

  <rect x="80" y="90" width="20" height="20" rx="4" fill="#0d6efd"/>
  <polyline points="85,100 92,107 101,93" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <text x="115" y="106" fill="#6c757d" text-decoration="line-through">撰寫專案提案</text>

  <rect x="80" y="130" width="20" height="20" rx="4" fill="#0d6efd"/>
  <polyline points="85,140 92,147 101,133" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <text x="115" y="146" fill="#6c757d" text-decoration="line-through">與設計團隊開會</text>

  <rect x="80" y="170" width="20" height="20" rx="4" fill="#ffffff" stroke="#adb5bd" stroke-width="2"/>
  <text x="115" y="186" fill="#212529">完成 UI 設計稿</text>

  <rect x="80" y="210" width="20" height="20" rx="4" fill="#ffffff" stroke="#adb5bd" stroke-width="2"/>
  <text x="115" y="226" fill="#212529">進行使用者測試</text>

  <rect x="80" y="250" width="20" height="20" rx="4" fill="#ffffff" stroke="#adb5bd" stroke-width="2"/>
  <text x="115" y="266" fill="#212529">準備簡報材料</text>

  <!-- Circular checkbox variant -->
  <text x="320" y="70" fill="#495057" font-weight="600">圓形樣式</text>

  <circle cx="340" cy="100" r="11" fill="#198754"/>
  <polyline points="335,100 340,105 347,95" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="360" y="106" fill="#6c757d" text-decoration="line-through">寄送感謝信</text>

  <circle cx="340" cy="140" r="11" fill="#ffffff" stroke="#adb5bd" stroke-width="2"/>
  <text x="360" y="146" fill="#212529">整理會議記錄</text>

  <circle cx="340" cy="180" r="11" fill="#ffffff" stroke="#adb5bd" stroke-width="2"/>
  <text x="360" y="186" fill="#212529">更新專案時程</text>

  <circle cx="340" cy="220" r="11" fill="#ffffff" stroke="#adb5bd" stroke-width="2"/>
  <text x="360" y="226" fill="#212529">安排下次回顧</text>
</g>

</svg>