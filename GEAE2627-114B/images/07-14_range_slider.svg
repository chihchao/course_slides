<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<rect width="600" height="400" fill="#f8f9fa"/>

<g font-family="Arial, sans-serif" font-size="14">
  <text x="80" y="80" fill="#495057" font-weight="600">價格範圍</text>
  <text x="400" y="80" fill="#0d6efd" font-weight="700">NT$ 2,000 - 8,500</text>

  <rect x="80" y="110" width="440" height="6" rx="3" fill="#e9ecef"/>
  <rect x="170" y="110" width="240" height="6" rx="3" fill="#0d6efd"/>

  <circle cx="170" cy="113" r="14" fill="#ffffff" stroke="#0d6efd" stroke-width="3"/>
  <circle cx="410" cy="113" r="14" fill="#ffffff" stroke="#0d6efd" stroke-width="3"/>

  <text x="70" y="150" fill="#6c757d" font-size="12">NT$ 0</text>
  <text x="490" y="150" fill="#6c757d" font-size="12">NT$ 20,000</text>

  <!-- Second slider -->
  <text x="80" y="220" fill="#495057" font-weight="600">臥室數量</text>
  <text x="420" y="220" fill="#0d6efd" font-weight="700">2 - 4 間</text>

  <rect x="80" y="250" width="440" height="6" rx="3" fill="#e9ecef"/>
  <rect x="168" y="250" width="264" height="6" rx="3" fill="#0d6efd"/>

  <circle cx="168" cy="253" r="14" fill="#ffffff" stroke="#0d6efd" stroke-width="3"/>
  <circle cx="432" cy="253" r="14" fill="#ffffff" stroke="#0d6efd" stroke-width="3"/>

  <text x="76" y="290" fill="#6c757d" font-size="11">1</text>
  <text x="164" y="290" fill="#6c757d" font-size="11">2</text>
  <text x="252" y="290" fill="#6c757d" font-size="11">3</text>
  <text x="340" y="290" fill="#6c757d" font-size="11">4</text>
  <text x="428" y="290" fill="#6c757d" font-size="11">5</text>
  <text x="516" y="290" fill="#6c757d" font-size="11">6+</text>
</g>

</svg>