<h3 id="figma-%E4%BB%8B%E9%9D%A2">Figma 介面</h3>
<ul>
<li>介面佈局：左側是導航欄，包含使用者訊息、主題切換（可切換深色或淺色模式）。中間部分是團隊管理模塊。</li>
<li>團隊與項目：Figma 的所有文件必須處於某個「團隊 (Team)」下方。在團隊中可以創建「項目 (Project)」，你可以將項目視為文件夾。</li>
</ul>
</section>

<h3 id="%E8%A8%AD%E8%A8%88%E6%96%87%E4%BB%B6%E7%9A%84%E5%9B%9B%E7%A8%AE%E6%A8%A1%E5%BC%8F">設計文件的四種模式</h3>
<p>進入設計文件後，有四種重要的操作模式：</p>
<ul>
<li>設計模式：常規的編輯模式，用於繪製界面與元素設計。</li>
<li>原型模式：用於製作頁面間的交互跳轉與動畫效果。</li>
<li>開發者模式：供工程師查看代碼與標註（通常需付費或教育帳號）。</li>
<li>預覽模式：點擊右上角的播放按鈕，可在新標籤頁查看最終的設計或交互成果。</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="gaia" data-style=":root {

<h3 id="%E7%B7%A8%E8%BC%AF%E4%BB%8B%E9%9D%A2">編輯介面</h3>
<ul>
<li>左側資源欄：包含文件標題、Pages（頁面管理，可用於分類如 APP、網頁、圖標）及 Layers（圖層列表）。</li>
<li>畫布區：中間的操作區域。按住空白鍵可拖拽移動，按住 Ctrl/Command 配合滾輪可縮放。</li>
<li>右側屬性面板：顯示選中元素的屬性（如文字大小、顏色等）。</li>
<li>底部工具欄</li>
</ul>
</section>

<h3 id="%E5%BA%95%E9%83%A8%E5%B7%A5%E5%85%B7%E6%AC%84">底部工具欄</h3>
<ul>
<li>選擇與手形工具：第一個是選擇工具 (V)。第二個是手形工具 (H)，用於拖拽畫布。
<ul>
<li>技巧：實際上我們會直接按住空白鍵來拖拽畫布，而非手動切換工具。</li>
</ul>
</li>
<li>Frame 與 Section：Frame (F) 是 Figma 最重要的編組類型。選中後，右側會出現各類設備（如 iPhone 16、Desktop）的預設尺寸。Section 則用於包裝多個 Frames以便統一移動。</li>
<li>基礎圖形工具：包含矩形、線段、箭頭、圓形、多邊形、星形及置入圖片/影片。
<ul>
<li>關鍵快捷鍵：拖拽圖形時按住 Shift 鍵可繪製正方形或正圓，繪製線段時則可鎖定 45 度角。</li>
</ul>
</li>
<li>向量與文本工具：鋼筆 (P) 用於繪製貝茲曲線，鉛筆則是自由軌跡。文本工具 (T) 點擊可輸入單行，拖拽則可建立文本框。</li>
</ul>
</section>

<h3 id="%E5%B1%AC%E6%80%A7%E9%9D%A2%E6%9D%BF">屬性面板</h3>
<p>屬性面板用於調整圖層參數。</p>
<ul>
<li>位置與對齊(Position)：包含 X/Y 座標。
<ul>
<li>技巧：選中元素並按住 Alt 鍵，將鼠標懸浮於其他元素上，可即時查看精確的間距數值。</li>
</ul>
</li>
<li>佈局(Layout)：控制寬 (W)、高 (H)。其中 Clip Content（裁剪內容）可控制超出畫板範圍的元素是否顯示。</li>
<li>外觀與樣式(Appearance)：包含透明度、圖層疊加模式及圓角設定。
<ul>
<li>特殊功能：點擊圓角設置旁的點，可單獨設置四角，並開啟「平滑圓角」，這是蘋果常用的工業設計邏輯。</li>
</ul>
</li>
<li>填充(Fill)：不僅是填色，還包含線性/徑向漸變、圖片或影片填充。一個圖層可點擊 + 號疊加多個填充內容。</li>
</ul>
</section>

<h3 id="%E5%85%83%E7%B4%A0%E7%BD%AE%E5%85%A5%E8%88%87%E6%8B%96%E6%8B%BD%E6%8A%80%E5%B7%A7">元素置入與拖拽技巧</h3>
<ul>
<li>視覺陷阱：有時元素視覺上在畫板內，但圖層列表中並未縮進，這會導致移動畫板時元素沒跟著跑。</li>
<li>置入技巧：必須將鼠標箭頭移入容器邊緣內才算正式置入。</li>
<li>鎖定層級拖拽：拖動元素時按住 空白鍵 (Space)，可以防止元素在跨越其他畫板時自動切換「父級」，使其保持在原始容器中。
<ul>
<li>元素 + 空白鍵：拖曳元素不會放進 Frame</li>
</ul>
</li>
<li>穿透選擇：面對多層編組，按住 Ctrl / Command 鍵可直接點選最底層的視覺元素，無需逐層雙擊進入。</li>
</ul>
</section>

<h3 id="%E7%B7%A8%E7%B5%84%E9%A1%9E%E5%9E%8Bgroup-vs-frame-vs-section">編組類型：Group vs. Frame vs. Section</h3>
<p>Figma 提供不同特性的編組方式，應根據需求選擇：</p>
<ul>
<li>Group (基礎編組)：快捷鍵 Ctrl/Command + G。將多個圖層視為一個整體進行排版。其邊框根據內容邊緣自動形成，縮放時內容會跟著等比變形。</li>
<li>選定最底層：Command + Ctrl + 點擊元素</li>
<li>Frame (畫框)：它像是一個「視窗容器」，拖拽 Frame 邊緣時，裡面的內容不會自動等比例縮放，而是可以根據設定進行響應式適配。
<ul>
<li>建議：若不清楚為何要用 Frame，不要強行使用，先用 Group 即可。</li>
</ul>
</li>
<li>Section (分區)：用於在大畫布中容納多個畫板 (Frame)，方便統一導出或進行交和文檔說明。</li>
</ul>
</section>

<p>字號控制文字圖形的大小。</p>

<li>尺寸定義：字號衡量的是字形包圍的核心區域。注意，選中文字後外圈多出的空間是「行高」。</li>
<li>中文字號規範建議：
<ul>
<li>標題：16px - 30px</li>
<li>正文：13px - 16px</li>
<li>注釋：10px - 12px</li>
</ul>
</li>

<h3 id="line-height--letter-spacing">Line Height &amp; Letter Spacing</h3>
<ul>
<li>行高：指單行文本所佔據的垂直高度。
<ul>
<li>重要規則：行高必須大於字號，以保留閱讀間隙。強烈建議保持默認 (Auto) 或增加行高，切勿為了對齊而將行高調至比字號還小，這會導致文字被裁切或重疊。</li>
</ul>
</li>
<li>字間距：文字間的左右間隙。
<ul>
<li>應用：中文環境通常不需要設置（保持 0%）；英文則因字母寬度不一，可能需依據官方規範（如 Apple 規範）微調百分比來提升節奏感。</li>
</ul>
</li>
</ul>

<li>其他：包含數字列表、下滑線、大小寫轉換等細部調整。</li>

<h3 id="%E5%9C%96%E7%89%87%E7%BD%AE%E5%85%A5">圖片置入</h3>
<ul>
<li>填充選擇：在填充面板中點擊選擇圖片文件。</li>
<li>複製貼上：從外部或網頁直接 Ctrl/Cmd + C 複製圖片後在 Figma 中貼上。</li>
<li>截圖貼上：通過截圖工具將圖像存入剪貼板後貼入。這能有效縮小圖片體積，避免原圖過大導致文件卡頓。</li>
<li>直接拖拽：從系統文件夾直接將圖片拖入畫布。</li>
<li>進階技巧：選中一個空向量圖形後貼上圖片，系統會自動將圖片填充進該圖形內。</li>
</ul>

<h3 id="%E5%9C%96%E7%89%87%E8%AA%BF%E7%AF%80">圖片調節</h3>
<p>當圖片比例與容器不符時，可切換填充模式：</p>
<ul>
<li>Fill (填充)：填滿容器，可能裁切邊緣（最常用）。</li>
<li>Fit (適應)：完整顯示原圖，容器內可能留白。</li>
<li>Crop (裁切)：進入編輯模式手動縮放與移動圖片位置（如調整頭像位置）。</li>
<li>Tile (平鋪)：按原尺寸重複排列。</li>
</ul>
</section>

<h3 id="%E9%81%AE%E7%BD%A9-mask">遮罩 (Mask)</h3>
<p>遮罩用於透過一個圖形隱藏其他層的特定部分。</p>
<ul>
<li>操作方法：將作為形狀的圖層放在最底層，選中該圖形與要被遮蓋的圖片，點擊右鍵選擇 &quot;Use as Mask&quot;（或點擊頂部工具欄的遮罩圖標）。</li>
<li>層級特徵：圖層列表中會出現一個向上的箭頭，代表下方遮罩圖形正在對其上方的所有圖層產生遮罩效果。</li>
<li>重要警示：建立編組：如果不建立編組 (Group)，遮罩會影響同層級上方「所有」圖層。一定要將遮罩圖形與被遮罩的元素放在同一個編組內，以限制遮罩的作用範圍。</li>
</ul>
</section>
