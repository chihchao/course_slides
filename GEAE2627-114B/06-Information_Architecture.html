<h3 id="%E4%BB%80%E9%BA%BC%E6%98%AF%E8%B3%87%E8%A8%8A%E6%9E%B6%E6%A7%8B">什麼是資訊架構？</h3>
<p>資訊架構是數位空間的藍圖，是一種「讓資訊變得有條理」的設計思維。它透過組織、分類、標籤與導航，將龐雜的資料轉化為可理解、可檢索的知識系統。</p>
<ul>
<li>如同書本的目錄或大樓的樓層圖。</li>
<li>讓使用者明確知道「這裡有什麼」、「我現在在哪裡」以及「如何抵達目的地」。</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>
</section>

<h3 id="%E6%A0%B8%E5%BF%83%E5%83%B9%E5%80%BC%E9%99%8D%E4%BD%8E%E6%88%90%E6%9C%AC%E6%8F%90%E5%8D%87%E9%AB%94%E9%A9%97">核心價值：降低成本，提升體驗</h3>
<p>良好的 IA 設計對使用者與產品具有以下三大價值：</p>
<ul>
<li>轉化過載資訊：透過結構化設計，將混亂的資料整理成有邏輯的系統。</li>
<li>降低搜尋成本：藉由合理的分類與命名，大幅縮減使用者的時間與認知負荷。</li>
<li>提升使用體驗：確保使用者在「對的時間」找到「對的資訊」，建立與系統一致的心理模型。</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>

<p>資訊架構並非數位產品的專利，它隱身於我們的生活周遭。透過系統化的組織與分類，IA 協助我們在海量資訊中建立秩序，優化決策效率。</p>
<p>零售空間佈局（超市貨架）：<br />
透過區域化管理（如生鮮、冷凍、日用品），建立直覺的動線，縮短消費者的尋找路徑。</p>

<h3 id="%E6%83%85%E5%A2%83-context">情境 (Context)</h3>
<p>情境指的是組織機構的目標、預算、人力、文化以及技術限制。我們必須理解組織機構為什麼要建立這個產品，以及在什麼樣的環境下運作。</p>
<ul>
<li>目標：組織機構希望透過這個資訊系統達成什麼？是增加銷量、降低客服成本，還是純粹品牌宣傳？</li>
<li>約束：現有的資料庫結構是否能支援複雜的分類？搜尋引擎的演算法如何運作？</li>
<li>資源：有多少預算維護內容的更新？</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E6%83%85%E5%A2%83%E7%AF%84%E4%BE%8B">情境範例</h3>
<p>以大學課程註冊系統為例：</p>
<ul>
<li>目標：確保學生在開學前完成選課，並自動計算學雜費。</li>
<li>限制與資源：系統必須在特定時間（如選課週）承受極高流量；同時需符合學校的行政法規（如先修課程限制）。</li>
<li>文化與政治：系所之間的名額分配權重，以及學術政策對選課流程的影響。</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E5%85%A7%E5%AE%B9-content">內容 (Content)</h3>
<p>內容是指系統中所包含的所有資訊單元，或是使用者有可能會用到的資訊的統稱。我們需要分析內容的數量、所有權、格式以及結構。</p>
<ul>
<li>內容類型：是結構化的資料（如產品規格），還是非結構化的內容（如部落格文章）？</li>
<li>中繼資料 (Metadata)：我們如何標記內容？這些標籤是否能幫助使用者進行篩選？</li>
<li>動態性：內容是靜態不變的，還是會隨著使用者行為或時間快速更新？</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E5%85%A7%E5%AE%B9%E7%AF%84%E4%BE%8B">內容範例</h3>
<p>以影音串流平台 Netflix 為例。<br />
其「內容」支柱包含了數萬部影視作品。為了讓使用者不迷失，要為每部影片定義大量的中繼資料，例如：導演、演員、情緒（例如「感人的」、「緊張的」）、畫質等級等。<br />
這些內容屬性是建立「推薦系統」與「分類瀏覽」的基石，若沒有良好的內容定義，使用者將難以從海量資訊中找到想看的片子。</p>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E7%94%A8%E6%88%B6-users">用戶 (Users)</h3>
<p>用戶支柱關注的是誰在使用這個系統？他們的尋找行為為何？他們具備多少專業知識？</p>
<ul>
<li>尋找行為：用戶是知道自己要什麼（已知尋找），還是隨意逛逛（探索性尋找）？</li>
<li>心理模型：用戶如何歸類資訊？例如在超市裡，用戶預期「牛奶」會出現在乳品區還是飲品區？</li>
<li>資訊素養：用戶對於專業術語的理解程度。</li>
</ul>

<h3 id="%E7%94%A8%E6%88%B6%E7%AF%84%E4%BE%8B">用戶範例</h3>
<p>考慮一個醫療資訊網站。<br />
如果目標用戶是「專業醫生」，IA 可能會使用大量的專業醫學名詞（如：心肌梗塞，Myocardial Infarction）作為導覽標籤；<br />
但如果目標用戶是「一般病患家屬」，IA 則應調整為更親民的詞彙（如：心臟病發作、胸痛）。<br />
了解用戶的心理模型，才能確保標籤系統與導覽設計不會讓使用者感到挫折。</p>

<h3 id="%E4%B8%89%E5%A4%A7%E8%A6%81%E7%B4%A0%E7%9A%84%E4%BA%A4%E9%9B%86ia-%E7%9A%84%E7%94%9C%E8%9C%9C%E9%BB%9E">三大要素的交集：IA 的甜蜜點</h3>
<p>資訊架構專家的工作，就是找到這三者的交點。</p>
<table>
<thead>
<tr>
<th style="text-align:left">要素</th>
<th style="text-align:left">核心提問</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">情境</td>
<td style="text-align:left">「我們為什麼要建立這個系統？預算與技術限制是什麼？」</td>
</tr>
<tr>
<td style="text-align:left">內容</td>
<td style="text-align:left">「我們擁有什麼樣的資料？這些資料該如何分類與標記？」</td>
</tr>
<tr>
<td style="text-align:left">用戶</td>
<td style="text-align:left">「誰會來用？他們想解決什麼問題？他們的科技能力如何？」</td>
</tr>
</tbody>
</table>

<h3 id="%E8%B3%87%E8%A8%8A%E7%B5%84%E7%B9%94%E7%B3%BB%E7%B5%B1-1">資訊組織系統</h3>
<p>資訊組織系統（Organization Systems）是決定使用者能否在茫茫大海中定位資訊的關鍵。作為 IA 專家，我將針對你提到的組織結構與方案進行深入解析。</p>
<p>組織結構定義了內容單元之間的物理或邏輯關係。選擇正確的結構會直接影響使用者的導覽路徑。</p>

<h3 id="%E9%9A%8E%E5%B1%A4%E5%BC%8F%E7%B5%90%E6%A7%8B-hierarchical">階層式結構 (Hierarchical)</h3>
<p>這是最常見的結構，基於「父子關係」建立。使用者從廣泛的概念開始，逐步深入到具體的細節。</p>
<ul>
<li>特點：邏輯清晰，符合人類分類本能。</li>
<li>範例：企業官網的導覽選單。頂層是「關於我們」，下層分為「公司簡介」、「團隊成員」、「聯絡資訊」。</li>
<li>潛在問題：如果層級太深（超過四、五層），使用者容易迷失；如果太淺且寬，選單會過於擁擠。</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>

<p>這種結構允許使用者根據自己的需求，從多個維度同時存取資訊。</p>

<li>範例：電商網站的篩選系統。當你在尋找一雙鞋子時，你可以同時選定「尺寸：27」、「品牌：Nike」與「顏色：黑色」。這三個維度交織在一起，形成一個動態的結果頁面。</li>

<h3 id="%E7%B7%9A%E6%80%A7%E7%B5%90%E6%A7%8B-sequential">線性結構 (Sequential)</h3>
<p>這是一種引導式的結構，要求使用者按照特定的順序從一個步驟移動到下一個步驟。</p>
<ul>
<li>特點：限制自由度以確保流程完成。</li>
<li>範例：線上購物結帳流程。使用者必須先填寫「收件資訊」，接著是「付款方式」，最後才是「確認訂單」。你無法在未填寫地址前直接跳到付款頁面。</li>
</ul>

<h3 id="%E7%B2%BE%E7%A2%BA%E5%9E%8B%E7%B5%84%E7%B9%94%E6%96%B9%E6%A1%88">精確型組織方案</h3>
<p>這種方案將資訊分成互斥且定義明確的組別，使用者通常知道他們要找的具體目標。</p>
<ul>
<li>字母順序：適合已知名稱的查詢。例如：手機通訊錄。</li>
<li>時間順序：適合具備時間關聯性的資訊。例如：部落格的文章列表或新聞檔案庫。</li>
<li>地理位置：根據空間位置排序。例如：連鎖餐廳的店點查詢（按縣市劃分）。</li>
</ul>

<h3 id="%E6%A8%A1%E7%B3%8A%E5%9E%8B%E7%B5%84%E7%B9%94%E6%96%B9%E6%A1%88">模糊型組織方案</h3>
<p>這種方案將資訊分解為具有主觀性的類別。雖然稱為「模糊」，但對於探索性搜尋（不知道確切關鍵字）的使用者來說非常強大。</p>
<ul>
<li>主題方案：根據內容的主旨分類。範例：新聞網站分為政治、財經、運動、娛樂。</li>
<li>任務方案：根據使用者想要完成的動作分類。範例：銀行 App 劃分為「轉帳」、「繳費」、「理財」。</li>
<li>用戶群方案：根據特定的目標受眾分類。範例：大學網站分為「在校生」、「教職員」、「校友」。</li>
<li>隱喻方案：使用直觀的類比來組織。範例：早期電腦介面的「垃圾桶」圖示代表刪除，「資料夾」代表目錄。</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E4%BB%80%E9%BA%BC%E6%98%AF%E6%A8%99%E7%B1%A4%E7%B3%BB%E7%B5%B1">什麼是標籤系統？</h3>
<p>標籤系統是指在數位環境中，用來代表類別、選項、連結或內容的語言描述。</p>
<p>在資訊架構中，標籤系統就像是導覽指標。如果把網站或 App 比喻成一棟大樓，標籤就是門牌和樓層介紹。它決定了使用者能否快速理解「我在哪裡？」以及「我要去的地方在哪？」。例如：</p>
<p>在一個電商平台，「購物車」是一個標籤。雖然它只是一個圖示加上文字，但它代表了「暫存選購商品的虛擬空間」這個複雜的概念。</p>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E5%A6%82%E4%BD%95%E5%91%BD%E5%90%8D">如何命名？</h3>
<p>命名的核心原則是以使用者為中心，而非「以公司內部術語為中心」。</p>
<p>命名策略：</p>
<ul>
<li>具體性：標籤應該具備預測性。使用者看到標籤後，應該能準確猜到點擊後會看到什麼。</li>
<li>語言一致性：決定要用動詞（如：去購物）還是名詞（如：商品列表）。</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>
</section>

<h3 id="%E5%A6%82%E4%BD%95%E5%88%86%E9%A1%9E">如何分類？</h3>
<ul>
<li>
<p>層級式分類：從廣泛到具體。</p>
</li>
<li>
<p>主題式分類：根據內容性質分類。</p>
</li>
<li>
<p>範例：大學官網的命名</p>
<ul>
<li>反面教材：使用內部行政名稱，如「教務處二組」（使用者不知道這跟選課有關）。</li>
<li>正面教材：使用功能性名稱，如「選課與學分查詢」。</li>
</ul>
</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E6%A8%99%E7%B1%A4%E7%9A%84%E6%BA%96%E7%A2%BA%E6%80%A7%E8%88%87%E4%B8%80%E8%87%B4%E6%80%A7">標籤的準確性與一致性</h3>
<p>這是標籤系統最容易崩壞的地方。如果同一個動作在不同頁面有不同的名字，使用者就會感到困惑。</p>
<ul>
<li>
<p>準確性<br />
標籤必須誠實。如果標籤寫著「免費下載」，點進去後卻要求註冊或付費，這就是標籤不準確。</p>
</li>
<li>
<p>一致性<br />
這包含詞彙一致性與視覺一致性。</p>
<ul>
<li>如果首頁叫「個人設定」，內頁就不要改叫「帳號資訊」。</li>
<li>如果主選單使用 16px 的字體，所有同級標籤也應保持一致。</li>
</ul>
</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E6%96%87%E6%9C%AC%E8%88%87%E5%9C%96%E7%A4%BA%E7%9A%84%E6%90%AD%E9%85%8D">文本與圖示的搭配</h3>
<p>圖示可以增加視覺美感並節省空間，但「圖示是輔助，文本是核心」。除了極少數公認的圖示（如：放大鏡代表搜尋、齒輪代表設定），大多數圖示若沒有文字標籤，都會產生歧義。</p>
<ul>
<li>搭配準則：
<ul>
<li>圖示應具備聯想力：垃圾桶代表刪除，心形代表收藏。</li>
<li>文字標籤不可省略：除非你的使用者全都是極高頻率的專家級用戶。</li>
<li>位置關係：通常圖示在左（或上），文字在右（或下）。</li>
</ul>
</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>
</section>

<p>在網站或應用程式的設計中，導覽系統就像是一份地圖與路標，指引使用者「我現在在哪裡」、「我能去哪裡」以及「我該如何回去」。</p>
<p>良好的導覽系統能降低使用者的認知負荷，讓資訊架構 變得直觀且易於探索。</p>

</tr>
<tr>
<td style="text-align:left">關聯</td>

<h3 id="%E8%BC%94%E5%8A%A9%E5%B0%8E%E8%A6%BD">輔助導覽</h3>
<p>當主要導覽不足以支撐複雜路徑時，輔助導覽能提供額外的支援，防止使用者迷路。</p>

<th style="text-align:left">類型</th>
<th style="text-align:left">主要目的</th>
<th style="text-align:left">常見位置</th>

</tr>
<tr>
<td style="text-align:left">網站地圖</td>
<td style="text-align:left">提供全景式的目錄，協助非線性搜索</td>
<td style="text-align:left">頁尾連結或獨立導覽頁</td>
</tr>
<tr>
<td style="text-align:left">頁尾</td>
<td style="text-align:left">收納次要資訊與法律規範</td>

<p>在資訊架構的範疇中，<strong>搜尋系統（Search Systems）</strong> 是使用者在無法透過瀏覽快速找到資訊時的關鍵路徑。它不只是個「搜尋框」，而是一套包含語意理解、資料檢索與結果呈現的複雜機制。</p>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E4%BB%80%E9%BA%BC%E6%99%82%E5%80%99%E9%9C%80%E8%A6%81%E6%90%9C%E5%B0%8B%E5%8A%9F%E8%83%BD">什麼時候需要搜尋功能？</h3>
<p>並非所有網站都一定要有搜尋功能。通常在以下情境，搜尋系統是必不可少的：</p>
<ul>
<li>資料量龐大且多樣：當內容超過數百頁，使用者無法透過選單逐層點選時。例如：Amazon。商品太多，不可能只靠分類選單找到特定的藍牙耳機。</li>
<li>使用者帶有明確目的：使用者已經知道要找什麼，想直接跳轉。例如：維基百科。使用者想直接查「量子力學」，直接輸入比從「科學」分類點進去快得多。</li>
<li>導覽系統失效或過於複雜：當資訊分類有重疊，使用者不確定該去哪個目錄找。例如：政府入口網站。補助資訊可能在「社會福利」也可能在「勞工事務」，搜尋能打破分類隔閡。</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>
</section>

<h3 id="%E6%90%9C%E5%B0%8B%E7%B3%BB%E7%B5%B1%E7%9A%84%E7%B5%84%E6%88%90">搜尋系統的組成</h3>
<table>
<thead>
<tr>
<th style="text-align:left">組件</th>
<th style="text-align:left">說明</th>
<th style="text-align:left">範例</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">搜尋框</td>
<td style="text-align:left">使用者的進入點，位置應明顯。</td>
<td style="text-align:left">網頁右上角或頁面中央的大型輸入框。</td>
</tr>
<tr>
<td style="text-align:left">搜尋引擎</td>
<td style="text-align:left">後端處理邏輯，包含索引與抓取。</td>
<td style="text-align:left">Elasticsearch 或 Algolia 引擎。</td>
</tr>
<tr>
<td style="text-align:left">結果頁面</td>
<td style="text-align:left">展示搜尋後的結果與導覽工具。</td>
<td style="text-align:left">包含摘要、縮圖與分頁導覽的列表頁。</td>
</tr>
</tbody>
</table>
<p>有效的搜尋系統能降低使用者的認知負荷，讓他們在混亂的資料中，能精準地找到目標。</p>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E6%90%9C%E5%B0%8B%E4%BB%8B%E9%9D%A2%E8%A8%AD%E8%A8%88%E7%9A%84%E4%B8%89%E5%A4%A7%E8%A6%81%E7%B4%A0%E8%BC%B8%E5%85%A5%E5%BB%BA%E8%AD%B0">搜尋介面設計的三大要素：輸入建議</h3>
<p>在使用者輸入過程中即時顯示預測結果。這能減少輸入錯誤，並引導使用者使用系統偏好的關鍵字。</p>
<ul>
<li>設計重點： 顯示關鍵字預測、直接顯示內容預覽（如商品圖）。</li>
<li>範例：
<ul>
<li>在 YouTube 搜尋「AI」，下拉選單會出現「AI 音樂製作」、「AI 繪圖教學」等建議，幫助使用者縮小範圍。</li>
<li>在 Apple 官網 搜尋「iPhone」，建議框會直接顯示最新的 iPhone 機型照片與連結。</li>
</ul>
</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E6%90%9C%E5%B0%8B%E4%BB%8B%E9%9D%A2%E8%A8%AD%E8%A8%88%E7%9A%84%E4%B8%89%E5%A4%A7%E8%A6%81%E7%B4%A0%E7%B5%90%E6%9E%9C%E6%8E%92%E5%BA%8F">搜尋介面設計的三大要素：結果排序</h3>
<p>搜尋結果不應只是隨機列出，必須根據「相關性（Relevancy）」進行排序。</p>
<ul>
<li>設計重點： 考慮關鍵字匹配度、熱門程度、發布時間（如新聞）或個人化偏好。</li>
<li>範例：
<ul>
<li>Google 搜尋：排名第一的通常是權威性最高、點擊率最穩定的網頁。</li>
<li>Netflix：搜尋「Action」時，排序會優先顯示你可能喜歡的動作片，而不僅僅是按字母順序。</li>
</ul>
</li>
</ul>

<p>篩選通常是全域的（如：僅看 4 顆星以上）；分頁導覽則是根據搜尋結果的屬性動態產生的。</p>
<ul>
<li>設計重點：讓使用者在大量結果中，透過屬性（顏色、價格、品牌）快速去蕪存菁。</li>
<li>範例：
<ul>
<li>在 Airbnb 搜尋「東京住宿」後：
<ul>
<li>篩選：日期、人數。</li>
<li>分頁導覽：房型（整套房子、獨立房間）、設施（有 WiFi、有廚房）、價格區間。</li>
</ul>
</li>
</ul>
</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E5%BB%BA%E7%BD%AE%E8%88%87%E9%A9%97%E8%AD%89%E5%B7%A5%E5%85%B7">建置與驗證工具</h3>
<p>在構建一個資訊系統時，最核心的挑戰在於確保「開發者想的」與「使用者想的」達成一致。這正是卡片分類法與樹狀測試發揮作用的地方。</p>
<ul>
<li>卡片分類法：用於探索階段，幫助我們理解使用者如何對資訊進行歸類，進而建立符合直覺的分類體系。
<ul>
<li>開放式卡片分類</li>
<li>封閉式卡片分類</li>
</ul>
</li>
<li>樹狀測試：用於驗證階段，觀察使用者在層級目錄中尋找資訊的過程，評估導覽結構的有效性。</li>
</ul>

<h3 id="%E9%96%8B%E6%94%BE%E5%BC%8F%E5%8D%A1%E7%89%87%E5%88%86%E9%A1%9E">開放式卡片分類</h3>
<p>在開放式分類中，參與者會拿到一疊寫有內容標題或功能的卡片，他們需要將這些卡片按照自己的邏輯分組，並為每一組「自行命名」標籤。</p>
<ul>
<li>核心目標：了解使用者腦中的分類邏輯與命名偏好。</li>
<li>適用時機：網站開發初期，或需要重新定義導覽分類時。</li>
</ul>
<p>假設我們正在設計一個大型電商平台的首頁。我們給使用者卡片包含：電風扇、除濕機、吸塵器、平底鍋、氣炸鍋。<br />
使用者 A 可能會將前三者歸類為「生活家電」，後兩者歸類為「廚房用具」。<br />
使用者 B 則可能將吸塵器與除濕機歸類為「居家環境」，將電風扇、平底鍋、氣炸鍋歸類為「其他」。<br />
透過分析大量使用者的分類結果，我們能找出最普遍的分類共識。</p>
<footer>永續生活理念 UX/UI 設計實務</footer>
</section>

<h3 id="%E5%B0%81%E9%96%89%E5%BC%8F%E5%8D%A1%E7%89%87%E5%88%86%E9%A1%9E">封閉式卡片分類</h3>
<p>參與者同樣會拿到卡片，但他們必須將卡片歸類到「既定」的類別框架中，不能自行命名新的標籤。</p>
<ul>
<li>核心目標：驗證現有的分類標籤是否清晰、明確。</li>
<li>適用時機：已經有初步架構，想測試內容放入這些類別是否會讓使用者感到困惑。</li>
</ul>
<p>同樣的電商案例，我們已經決定了兩個分類：「家電用品」與「廚房設備」。<br />
如果使用者將「氣炸鍋」猶豫不決地放進這兩個分類，或者放錯地方，這表示標籤的定義可能重疊，需要進一步調整。</p>

<h3 id="%E6%A8%B9%E7%8B%80%E6%B8%AC%E8%A9%A6">樹狀測試</h3>
<p>如果說卡片分類是為了「建立架構」，那麼樹狀測試就是為了「驗證架構」。<br />
樹狀測試通常會去除所有的視覺設計（如顏色、圖示、排版），只呈現純文字的層級目錄。研究員會給使用者一個具體的任務，觀察他們是否能在這棵「資訊樹」中找到目標。</p>
<ul>
<li>核心目標：衡量導覽結構的可尋找性與路徑直覺性。</li>
<li>關鍵指標：成功率（是否找到）、尋找速度（花多久）、路徑直覺度（是否在目錄中上下切換、猶豫）。</li>
<li>與卡片分類的差異：卡片分類是「由下而上」，從細節內容往上推導分類；而樹狀測試是「由上而下」，從大分類往下去找細節。</li>
</ul>
<footer>永續生活理念 UX/UI 設計實務</footer>
</section>

<h3 id="%E9%A9%97%E8%AD%89%E6%B5%81%E7%A8%8B">驗證流程</h3>
<p>兩者通常會搭配使用：</p>
<ol>
<li>透過開放式卡片分類，搜集用戶的心智模型，產出初步的架構草圖。</li>
<li>整理草圖後，進行封閉式卡片分類，確認類別名稱是否具備代表性。</li>
<li>建立完整的資訊架構樹狀圖，進行樹狀測試。</li>
<li>根據樹狀測試的失敗路徑進行修正，直到可尋找性達到理想標準。</li>
</ol>
<footer>永續生活理念 UX/UI 設計實務</footer>

<h3 id="%E7%B6%B2%E7%AB%99%E5%9C%B0%E5%9C%96-1">網站地圖</h3>
<p>網站地圖是資訊架構中最具代表性的產出。它是一個視覺化的階層結構圖，用來展示網站或應用程式的導航框架。它的目的在於定義頁面與頁面之間的父子關係與並列關係。</p>
<p>一個好的網站地圖會標註出：</p>
<ul>
<li>主要導航層級（一級、二級、三級頁面）。</li>
<li>標籤名稱（使用者會看到的文字）。</li>
<li>特殊的功能模組或外部連結。</li>
</ul>

<h3 id="%E4%BD%BF%E7%94%A8%E8%80%85%E6%B5%81%E7%A8%8B">使用者流程</h3>
<p>使用者流程關注的是動態的路徑。當使用者帶著特定目標進入系統時，資訊如何引導他們從起點走向終點。這有助於發現結構中的斷點或邏輯漏洞。</p>
<p>這通常包含：</p>
<ul>
<li>起點（進入點）。</li>
<li>決策點（例如：是否已登入？）。</li>
<li>動作頁面（按鈕點擊）。</li>
<li>終點（任務完成畫面）。</li>
</ul>

透過合理的分類、分區與命名方式，不僅能讓使用者更快找到所需，也提升整體資訊的可讀性與可操作性。資訊架構，是讓資訊變得有條理的設計關鍵！
