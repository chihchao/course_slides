<h3 id="%E8%B3%87%E6%96%99%E7%A7%91%E5%AD%B8%E7%9A%84%E5%AE%9A%E7%BE%A9">資料科學的定義</h3>
<blockquote>
<p>一門結合<strong>統計學</strong>、<strong>程式設計</strong>與<strong>領域知識</strong>，<br />
從資料中萃取有意義洞見的跨領域學科。</p>
</blockquote>
<ul>
<li>資料科學 ≠ 單純的程式設計</li>
<li>資料科學 ≠ 單純的統計分析</li>
<li>資料科學 ＝ 兩者的整合，加上對問題的深度理解</li>
</ul>
<p>核心問題：<strong>「資料能告訴我們什麼？」</strong><br />
核心目標：<strong>將洞察轉化為解決現實問題的決策行動</strong></p>
</section>

<ul>
<li><strong>統計學</strong>：理解資料分佈、相關性與顯著性</li>
<li><strong>程式設計</strong>：資料處理、自動化與建模實作</li>
<li><strong>領域知識</strong>：定義有意義的問題，解讀分析結果</li>
</ul>
<p>三者交集之處，即為資料科學家的核心定位。</p>

<p>分析的方向由問題決定，清楚的定義是一切的起點。</p>

<li><strong>目的</strong>：描述現況 / 預測趨勢 / 支援決策？</li>

<li><strong>限制條件</strong>：資料可取得性、時間成本、隱私規範</li>
</ul>
<blockquote>
<p>提出正確的問題，比找到漂亮的答案更重要。</p>

<p>真實資料幾乎都有品質問題，清理是分析前的必要程序。</p>
<table>
<thead>

<tbody>
<tr>

<td style="text-align:left">欄位為空（NaN）</td>
<td style="text-align:left">問卷未填答、感測器斷線</td>

<h3 id="%E6%AD%A5%E9%A9%9F%E4%B8%89%E7%BC%BA%E5%A4%B1%E5%80%BC%E8%99%95%E7%90%86">步驟三：缺失值處理</h3>
<p>缺失值的處理策略取決於<strong>缺失比例</strong>與<strong>欄位重要性</strong>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> pandas <span class="hljs-keyword">as</span> pd

df = pd.read_csv(<span class="hljs-string">&#x27;data.csv&#x27;</span>)

df.isnull().<span class="hljs-built_in">sum</span>()                          <span class="hljs-comment"># 各欄位缺失數量</span>
df.isnull().mean() * <span class="hljs-number">100</span>                   <span class="hljs-comment"># 各欄位缺失比例（%）</span>

df.dropna()                                <span class="hljs-comment"># 刪除含缺失值的列（缺失少時適用）</span>
df.dropna(subset=[<span class="hljs-string">&#x27;age&#x27;</span>, <span class="hljs-string">&#x27;income&#x27;</span>])        <span class="hljs-comment"># 僅針對關鍵欄位刪除</span>
df[<span class="hljs-string">&#x27;age&#x27;</span>].fillna(df[<span class="hljs-string">&#x27;age&#x27;</span>].mean())         <span class="hljs-comment"># 數值欄位：以平均值填補</span>
df[<span class="hljs-string">&#x27;age&#x27;</span>].fillna(df[<span class="hljs-string">&#x27;age&#x27;</span>].median())       <span class="hljs-comment"># 數值欄位：以中位數填補（較耐異常值）</span>
df[<span class="hljs-string">&#x27;city&#x27;</span>].fillna(df[<span class="hljs-string">&#x27;city&#x27;</span>].mode()[<span class="hljs-number">0</span>])    <span class="hljs-comment"># 類別欄位：以眾數填補</span>
df.ffill()                                 <span class="hljs-comment"># 時間序列：以前一筆填補</span>
</code></pre>
<ul>
<li>缺失比例 &gt; 40%：考慮<strong>捨棄該欄位</strong></li>
<li>缺失有規律（非隨機）時，需特別留意填補方式對分析的影響</li>
</ul>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># 重複值</span>
df.duplicated().<span class="hljs-built_in">sum</span>()                           <span class="hljs-comment"># 計算重複列數</span>
df.drop_duplicates()                            <span class="hljs-comment"># 移除完全重複的列</span>
df.drop_duplicates(subset=[<span class="hljs-string">&#x27;id&#x27;</span>])               <span class="hljs-comment"># 依特定欄位去重（保留第一筆）</span>

<span class="hljs-comment"># 型別轉換</span>
df[<span class="hljs-string">&#x27;date&#x27;</span>] = pd.to_datetime(df[<span class="hljs-string">&#x27;date&#x27;</span>])         <span class="hljs-comment"># 字串 → 日期</span>
df[<span class="hljs-string">&#x27;price&#x27;</span>] = df[<span class="hljs-string">&#x27;price&#x27;</span>].astype(<span class="hljs-built_in">float</span>)         <span class="hljs-comment"># 字串 → 數值</span>
df[<span class="hljs-string">&#x27;grade&#x27;</span>] = df[<span class="hljs-string">&#x27;grade&#x27;</span>].astype(<span class="hljs-string">&#x27;category&#x27;</span>)    <span class="hljs-comment"># 字串 → 類別型（節省記憶體）</span>

<span class="hljs-comment"># 格式標準化</span>
df[<span class="hljs-string">&#x27;city&#x27;</span>] = df[<span class="hljs-string">&#x27;city&#x27;</span>].<span class="hljs-built_in">str</span>.strip()             <span class="hljs-comment"># 移除前後空白</span>
df[<span class="hljs-string">&#x27;city&#x27;</span>] = df[<span class="hljs-string">&#x27;city&#x27;</span>].<span class="hljs-built_in">str</span>.replace(<span class="hljs-string">&#x27;台北市&#x27;</span>, <span class="hljs-string">&#x27;台北&#x27;</span>)  <span class="hljs-comment"># 統一寫法</span>
df.columns = df.columns.<span class="hljs-built_in">str</span>.lower().<span class="hljs-built_in">str</span>.strip() <span class="hljs-comment"># 欄位名稱標準化</span>
</code></pre>

<h3 id="%E6%AD%A5%E9%A9%9F%E4%B8%89%E7%95%B0%E5%B8%B8%E5%80%BC%E5%81%B5%E6%B8%AC%E8%88%87%E8%99%95%E7%90%86">步驟三：異常值偵測與處理</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np

<span class="hljs-comment"># 方法一：描述統計目視判斷</span>
df[<span class="hljs-string">&#x27;age&#x27;</span>].describe()

<span class="hljs-comment"># 方法二：IQR（四分位距）法</span>
Q1 = df[<span class="hljs-string">&#x27;age&#x27;</span>].quantile(<span class="hljs-number">0.25</span>)
Q3 = df[<span class="hljs-string">&#x27;age&#x27;</span>].quantile(<span class="hljs-number">0.75</span>)
IQR = Q3 - Q1
lower, upper = Q1 - <span class="hljs-number">1.5</span> * IQR, Q3 + <span class="hljs-number">1.5</span> * IQR
df_clean = df[df[<span class="hljs-string">&#x27;age&#x27;</span>].between(lower, upper)]  <span class="hljs-comment"># 保留合理範圍</span>

<span class="hljs-comment"># 方法三：Z-score 法</span>
<span class="hljs-keyword">from</span> scipy <span class="hljs-keyword">import</span> stats
z_scores = stats.zscore(df[<span class="hljs-string">&#x27;age&#x27;</span>].dropna())
df_clean = df[(<span class="hljs-built_in">abs</span>(z_scores) &lt; <span class="hljs-number">3</span>)]              <span class="hljs-comment"># 保留 3σ 以內</span>
</code></pre>
<ul>
<li><strong>刪除</strong>：異常值為資料錯誤（如年齡 = 999）</li>
<li><strong>截斷（Winsorizing）</strong>：將極端值替換為上下界，保留樣本數</li>
<li><strong>保留並標記</strong>：異常值本身具有分析意義時（如詐騙偵測）</li>
</ul>
</section>

<tr>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">基於你剛剛發現的問題（例如：缺失值、型態錯誤、重複值），請為我規劃一份詳細的資料清洗計畫。

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">請你根據剛剛的資料內容、統計數據與視覺化發現，為我撰寫一份正式的分析報告。

1. 執行摘要：以簡潔的文字概述報告的核心發現與價值。
2. 資料概況：說明分析的資料來源、範圍與清洗後的品質狀況。
